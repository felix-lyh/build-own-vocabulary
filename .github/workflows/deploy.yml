name: Deploy Next.js

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to ACR
              uses: docker/login-action@v3
              with:
                  registry: ${{ secrets.ACR_REGISTRY }}
                  username: ${{ secrets.ACR_USERNAME }}
                  password: ${{ secrets.ACR_PASSWORD }}

            - name: Build image
              run: |
                  docker build -t ${{ secrets.ACR_REGISTRY }}/myspace/next-app:latest .

            - name: Push image
              run: |
                  docker push ${{ secrets.ACR_REGISTRY }}/myspace/next-app:latest

            - name: Deploy ECS
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.ECS_HOST }}
                  username: ${{ secrets.ECS_USERNAME }}
                  key: ${{ secrets.ECS_SSH_KEY }}

                  script: |
                      docker pull ${{ secrets.ACR_REGISTRY }}/myspace/next-app:latest

                      docker stop next-app || true
                      docker rm next-app || true

                      docker run -d \
                        --name next-app \
                        -p 3000:3000 \
                        ${{ secrets.ACR_REGISTRY }}/myspace/next-app:latest
